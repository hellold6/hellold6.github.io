// --- Movement & Core Binds ---
bind "q" "+duck"
bind "MWHEELUP" "+jump"
bind "MWHEELDOWN" "+jump"

// --- Jumpthrow Bind ---
alias "+jumpthrow" "+jump; -attack; -attack2"
alias "-jumpthrow" "-jump"
bind "x" "+jumpthrow"

// --- Utility & Practice Binds ---
bind "v" "noclip"
bind "MOUSE5" "give weapon_smokegrenade"
bind "4" "slot4; slot12"
bind "=" "impulse 101"

// --- Scripting & Map Commands ---
bind "ENTER" "ent_fire script Enter"
bind "BACKSPACE" "ent_fire script Backspace"
bind "DEL" "ent_fire script Delete"

// --- Bot & Vote Management ---
bind "F1" "vote option1"
bind "F2" "vote option2"
bind "F3" "bot_kick"
bind "F4" "ent_teleport bot_t1"
bind "7" "bot_kill"

// --- Finalize ---
host_writeconfig
echo "--- Autoexec Loaded Successfully ---"